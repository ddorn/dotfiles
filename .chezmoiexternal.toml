# chezmoi manages these directories by downloading and extracting archives.
# Run `chezmoi apply` to install/update, or `chezmoi -R apply` to force refresh.

[".oh-my-zsh"]
    type = "archive"
    url = "https://github.com/ohmyzsh/ohmyzsh/archive/master.tar.gz"
    exact = true
    stripComponents = 1
    refreshPeriod = "168h"

[".oh-my-zsh/custom/plugins/zsh-syntax-highlighting"]
    type = "archive"
    url = "https://github.com/zsh-users/zsh-syntax-highlighting/archive/master.tar.gz"
    exact = true
    stripComponents = 1
    refreshPeriod = "168h"

[".oh-my-zsh/custom/plugins/zsh-autosuggestions"]
    type = "archive"
    url = "https://github.com/zsh-users/zsh-autosuggestions/archive/master.tar.gz"
    exact = true
    stripComponents = 1
    refreshPeriod = "168h"

[".oh-my-zsh/custom/plugins/zsh-history-substring-search"]
    type = "archive"
    url = "https://github.com/zsh-users/zsh-history-substring-search/archive/master.tar.gz"
    exact = true
    stripComponents = 1
    refreshPeriod = "168h"

[".local/bin/bw"]
    type = "archive-file"
    url = "https://vault.bitwarden.com/download/?app=cli&platform=linux"
    path = "bw"
    executable = true

{{- if eq .role "work-laptop" }}

[".local/bin/sway-launcher-desktop.sh"]
    type = "file"
    url = "https://raw.githubusercontent.com/Biont/sway-launcher-desktop/master/sway-launcher-desktop.sh"
    executable = true
    refreshPeriod = "720h"

[".local/share/ranger"]
    type = "archive"
    url = "https://ranger.fm/ranger-stable.tar.gz"
    exact = true
    stripComponents = 1
    refreshPeriod = "720h"

{{- $bat := gitHubLatestRelease "sharkdp/bat" }}

[".local/bin/bat"]
    type = "archive-file"
    url = "https://github.com/sharkdp/bat/releases/download/{{ $bat.TagName }}/bat-{{ $bat.TagName }}-x86_64-unknown-linux-musl.tar.gz"
    path = "bat-{{ $bat.TagName }}-x86_64-unknown-linux-musl/bat"
    executable = true
    refreshPeriod = "720h"

{{- end }}
