# chezmoi manages these directories by downloading and extracting archives.
# Run `chezmoi apply` to install/update, or `chezmoi -R apply` to force refresh.
#
# All GitHub sources are pinned to content that is at least 2 weeks old to
# reduce supply chain risk. See .chezmoiscripts/gh-old-commit.py and
# .chezmoiscripts/gh-delayed-release.py for the pinning logic.

{{ $old_commit     := joinPath .chezmoi.sourceDir ".chezmoiscripts" "gh-old-commit.py" -}}
{{ $delayed_release := joinPath .chezmoi.sourceDir ".chezmoiscripts" "gh-delayed-release.py" -}}
{{ $omz     := output $old_commit "ohmyzsh/ohmyzsh" | trim -}}
{{ $zsh_hl  := output $old_commit "zsh-users/zsh-syntax-highlighting" | trim -}}
{{ $zsh_as  := output $old_commit "zsh-users/zsh-autosuggestions" | trim -}}
{{ $zsh_hss := output $old_commit "zsh-users/zsh-history-substring-search" | trim -}}

[".oh-my-zsh"]
    type = "archive"
    url = "https://github.com/ohmyzsh/ohmyzsh/archive/{{ $omz }}.tar.gz"
    exact = true
    stripComponents = 1

[".oh-my-zsh/custom/plugins/zsh-syntax-highlighting"]
    type = "archive"
    url = "https://github.com/zsh-users/zsh-syntax-highlighting/archive/{{ $zsh_hl }}.tar.gz"
    exact = true
    stripComponents = 1

[".oh-my-zsh/custom/plugins/zsh-autosuggestions"]
    type = "archive"
    url = "https://github.com/zsh-users/zsh-autosuggestions/archive/{{ $zsh_as }}.tar.gz"
    exact = true
    stripComponents = 1

[".oh-my-zsh/custom/plugins/zsh-history-substring-search"]
    type = "archive"
    url = "https://github.com/zsh-users/zsh-history-substring-search/archive/{{ $zsh_hss }}.tar.gz"
    exact = true
    stripComponents = 1

[".local/bin/bw"]
    type = "archive-file"
    url = "https://vault.bitwarden.com/download/?app=cli&platform=linux"
    path = "bw"
    executable = true

{{- if eq .role "work-laptop" }}

{{ $sway := output $old_commit "Biont/sway-launcher-desktop" | trim -}}
{{ $bat  := output $delayed_release "sharkdp/bat" | trim -}}
{{ $btop := output $delayed_release "aristocratos/btop" | trim -}}

[".local/bin/sway-launcher-desktop.sh"]
    type = "file"
    url = "https://raw.githubusercontent.com/Biont/sway-launcher-desktop/{{ $sway }}/sway-launcher-desktop.sh"
    executable = true

[".local/share/ranger"]
    type = "archive"
    url = "https://ranger.fm/ranger-stable.tar.gz"
    exact = true
    stripComponents = 1
    refreshPeriod = "720h"

[".local/bin/bat"]
    type = "archive-file"
    url = "https://github.com/sharkdp/bat/releases/download/{{ $bat }}/bat-{{ $bat }}-x86_64-unknown-linux-musl.tar.gz"
    path = "bat-{{ $bat }}-x86_64-unknown-linux-musl/bat"
    executable = true

[".local/bin/btop"]
    type = "archive-file"
    url = "https://github.com/aristocratos/btop/releases/download/{{ $btop }}/btop-x86_64-unknown-linux-musl.tbz"
    path = "btop/bin/btop"
    executable = true

{{- end }}
