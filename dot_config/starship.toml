format = """${env_var.BOX_PROJECT}$all$fill$cmd_duration$time\
$line_break\
$jobs\
$battery\
$status\
$os\
$container\
$shell\
$character"""

[env_var.BOX_PROJECT]
variable = "BOX_PROJECT"
format = "[\\(box-$env_value\\)]($style) "
style = "bold yellow"

[time]
disabled = false
# time_range = '18:00:00-10:00:00'
time_format = "%H:%M"

[fill]
symbol = ' '
# style = '#ffa500'

[sudo]
disabled = false
