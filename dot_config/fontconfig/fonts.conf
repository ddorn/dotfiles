<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
 <!--
   Make the generic "monospace" family resolve to Lilex (installed via
   .chezmoiexternal.toml). A strong-bound prepend is required: the system
   60-latin.conf prepends "Noto Sans Mono" with a weak binding at a later
   stage, which would otherwise win over a plain <alias><prefer>.
 -->
 <match target="pattern">
   <test qual="any" name="family"><string>monospace</string></test>
   <edit name="family" mode="prepend" binding="strong"><string>Lilex</string></edit>
 </match>

 <!-- Emoji / icon / braille glyph fallback for terminals. -->
 <alias>
   <family>monospace</family>
   <prefer>
     <family>Noto Color Emoji</family>
     <family>Font Awesome 6 Free</family>
     <family>Braille</family>
   </prefer>
 </alias>
</fontconfig>
